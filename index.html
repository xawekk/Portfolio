<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xawekk | Portfolio & Rezerwacje</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <style>
        :root {
            --color-black: #000000;
            --color-medium-gray: #4A4A4A;
            --color-gray: #888888;
            --color-light-gray: #e0e0e0;
            --color-off-white: #f5f5f5;
            --color-white: #ffffff;
            --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius-btn: 999px;
            --radius-card: 22px; 
            --radius-input: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-main); background-color: var(--color-white); color: var(--color-black); line-height: 1.6; -webkit-font-smoothing: antialiased; }
        
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section-padding { padding: 80px 0; }
        .hidden { display: none !important; }

        .btn {
            display: inline-block;
            background-color: var(--color-black);
            color: var(--color-white);
            padding: 0.9rem 2.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid var(--color-black);
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: var(--radius-btn);
            text-decoration: none;
        }

        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-outline { background-color: transparent; color: var(--color-black); border: 1px solid var(--color-light-gray); }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { font-size: 0.85rem; font-weight: 500; color: var(--color-medium-gray); cursor: pointer; text-decoration: none; }

        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; background: #fbfbfd; padding-top: 70px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 0.5rem; text-transform: lowercase; }
        .hero p { font-size: 1.2rem; color: var(--color-gray); margin-bottom: 2.5rem; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        
        .gallery-item { 
            aspect-ratio: 3 / 4; 
            overflow: hidden; 
            border-radius: var(--radius-card); 
            cursor: pointer; 
            background: #eee;
            opacity: 0; 
            transform: translateY(20px); 
            transition: opacity 0.4s ease-out, transform 0.4s ease-out; 
            will-change: opacity, transform;
        }
        
        .gallery-item.visible { opacity: 1; transform: translateY(0); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.05); }

        .cta-section { background-color: var(--color-off-white); text-align: center; border-radius: 40px; margin: 0 2rem 80px; }

        .booking-wrapper { max-width: 600px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: var(--radius-card); border: 1px solid var(--color-light-gray); }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; color: var(--color-gray); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--color-light-gray); background: var(--color-off-white); border-radius: var(--radius-input); font-family: inherit; }

        footer { padding: 40px 0; border-top: 1px solid var(--color-light-gray); text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 15px; }
        .footer-links a { font-size: 0.85rem; color: var(--color-gray); text-decoration: none; font-weight: 500; }
        .footer-links a:hover { color: var(--color-black); }

        /* NOWY STYL DIAPORAMY / LIGHTBOXA (STYL OTOMOTO) */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            z-index: 2000; display: none; justify-content: center; align-items: center; 
            user-select: none;
        }
        .lightbox-wrapper { 
            width: 100%; height: 85vh; overflow: hidden; position: relative; 
        }
        .lightbox-track { 
            display: flex; width: 100%; height: 100%; 
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1); 
            will-change: transform; 
        }
        .lightbox-slide { 
            min-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding: 0 2rem; 
        }
        .lightbox-slide img { 
            max-width: 100%; max-height: 100%; border-radius: var(--radius-card); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); object-fit: contain; 
        }
        .lightbox-arrow { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(255,255,255,0.08); border: none; color: white; 
            font-size: 2.5rem; width: 60px; height: 60px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: background 0.2s, transform 0.2s; z-index: 2100; 
        }
        .lightbox-arrow:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.05); }
        .lightbox-arrow.prev { left: 2rem; }
        .lightbox-arrow.next { right: 2rem; }
        
        .lightbox-close { 
            position: absolute; top: 2rem; right: 2rem; color: white; 
            font-size: 1.5rem; cursor: pointer; z-index: 2100; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.08); border-radius: 50%; transition: background 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }
        
        .lightbox-counter { 
            position: absolute; top: 2rem; left: 50%; transform: translateX(-50%); 
            color: rgba(255,255,255,0.85); font-size: 0.9rem; font-weight: 500; z-index: 2100; 
            background: rgba(255,255,255,0.08); padding: 0.4rem 1.2rem; border-radius: 20px; backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .section-padding { padding: 40px 0; }
            .nav-links { gap: 0.8rem; }
            .nav-links a { font-size: 0.75rem; }
            .logo { font-size: 1rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .gallery-item { border-radius: 12px; }
            .hero { height: 60vh; }
            .hero p { font-size: 1rem; padding: 0 1rem; }
            .cta-section { margin: 0 1rem 40px; border-radius: 20px; padding: 40px 1rem; }
            .booking-wrapper { padding: 1.5rem; }
            
            /* Zmiany mobilne dla slidera */
            .lightbox-arrow { display: none; }
            .lightbox-slide { padding: 0 1rem; }
            .lightbox-slide img { border-radius: 12px; }
            .lightbox-close { top: 1rem; right: 1rem; }
            .lightbox-counter { top: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo" onclick="switchView('main')">xawekk</div>
            <nav class="nav-links">
                <a data-i18n="nav-port" onclick="switchView('main'); scrollToSection('portfolio');">Portfolio</a>
                <a data-i18n="nav-book" onclick="switchView('booking')">Rezerwacja</a>
                <button id="lang-btn" class="btn btn-outline" style="padding: 0.3rem 0.8rem; font-size: 0.7rem;" onclick="toggleLanguage()">EN</button>
            </nav>
        </div>
    </header>

    <main id="main-view">
        <section class="hero">
            <div class="container">
                <h1>xawekk</h1>
                <p data-i18n="hero-sub">Fotografia Artystyczna i Komercyjna</p>
                <button class="btn" data-i18n="btn-book" onclick="switchView('booking')">Zarezerwuj Sesję</button>
            </div>
        </section>

        <section id="portfolio" class="section-padding">
            <div class="container">
                <h2 style="margin-bottom: 40px; text-align: center;" data-i18n="port-title">Wybrane Prace</h2>
                <div class="gallery-grid" id="gallery-grid"></div>
            </div>
        </section>

        <section class="cta-section section-padding">
            <div class="container">
                <h2 style="margin-bottom: 20px;" data-i18n="cta-title">Gotowy na sesję?</h2>
                <button class="btn" data-i18n="btn-contact" onclick="switchView('booking')">Napisz do mnie</button>
            </div>
        </section>
    </main>

    <main id="booking-view" class="hidden" style="padding-top: 100px; padding-bottom: 60px;">
        <div class="container">
            <div class="booking-wrapper">
                <h2 style="margin-bottom: 2rem;" data-i18n="book-title">Rezerwacja Sesji</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label class="form-label" data-i18n="form-car-lbl">Model auta</label>
                        <input type="text" name="car_model" class="form-control" data-i18n-ph="form-car-ph" placeholder="np. Porsche 911" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="form-name-lbl">Twoje Imię / Nick</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="form-phone-lbl">Telefon</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+48 ..." required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;" data-i18n="form-submit">Wyślij zgłoszenie</button>
                    <p style="margin-top: 1rem; font-size: 0.8rem; color: #888; cursor: pointer; text-align: center;" data-i18n="btn-back" onclick="switchView('main')">← Wróć do galerii</p>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="https://www.instagram.com/xawekk/" target="_blank">Instagram</a>
                <a href="https://www.tiktok.com/@igxawekk" target="_blank">TikTok</a>
            </div>
            <p style="font-size: 0.7rem; color: #aaa;">&copy; <span id="year"></span> xawekk.</p>
        </div>
    </footer>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div id="lightbox-counter" class="lightbox-counter">1 / 15</div>
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        
        <button class="lightbox-arrow prev" onclick="prevImage(event)">&lsaquo;</button>
        
        <div class="lightbox-wrapper" onclick="closeLightbox()">
            <div id="lightbox-track" class="lightbox-track"></div>
        </div>
        
        <button class="lightbox-arrow next" onclick="nextImage(event)">&rsaquo;</button>
    </div>

    <script>
        const translations = {
            en: {
                "nav-port": "Portfolio",
                "nav-book": "Booking",
                "hero-sub": "Automotive & Fine Art Photography",
                "btn-book": "Book a Session",
                "port-title": "Selected Works",
                "cta-title": "Ready for a session?",
                "btn-contact": "Contact me",
                "book-title": "Session Booking",
                "form-car-lbl": "Car Model",
                "form-car-ph": "e.g. Porsche 911",
                "form-name-lbl": "Your Name / Nickname",
                "form-phone-lbl": "Phone",
                "form-submit": "Send Request",
                "btn-back": "← Back to gallery"
            },
            pl: {
                "nav-port": "Portfolio",
                "nav-book": "Rezerwacja",
                "hero-sub": "Fotografia Artystyczna i Komercyjna",
                "btn-book": "Zarezerwuj Sesję",
                "port-title": "Wybrane Prace",
                "cta-title": "Gotowy na sesję?",
                "btn-contact": "Napisz do mnie",
                "book-title": "Rezerwacja Sesji",
                "form-car-lbl": "Model auta",
                "form-car-ph": "np. Porsche 911",
                "form-name-lbl": "Twoje Imię / Nick",
                "form-phone-lbl": "Telefon",
                "form-submit": "Wyślij zgłoszenie",
                "btn-back": "← Wróć do galerii"
            }
        };

        let currentLang = 'pl';
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'pl' : 'en';
            document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'PL' : 'EN';
            
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                el.textContent = translations[currentLang][el.getAttribute('data-i18n')]; 
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => { 
                el.placeholder = translations[currentLang][el.getAttribute('data-i18n-ph')]; 
            });
        }

        const images = [
            "IMG_5830.jpg", "IMG_5845.jpg", "IMG_5864.jpg",
            "ferari1.jpg", "ferari2.jpg", "ferari3.jpg", "ferari4.jpg", "ferari5.jpg",
            "DSC_0097.jpg", "DSC_0100.jpg", "DSC_0102.jpg", "DSC_0152.jpg",
            "DSC_0160.jpg", "DSC_0156.jpg", "DSC_0142.jpg"
        ];

        let currentImgIdx = 0;
        const grid = document.getElementById('gallery-grid');
        const lightboxTrack = document.getElementById('lightbox-track');
        
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        // Generowanie galerii oraz automatyczne budowanie slajdów w tle
        images.forEach((src, idx) => {
            // Miniaturka w siatce głównej
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `<img src="${src}" loading="lazy" alt="Foto ${idx+1}">`;
            div.onclick = () => openLightbox(idx);
            grid.appendChild(div);
            imageObserver.observe(div);

            // Element wewnątrz suwaka lightboxa
            const slide = document.createElement('div');
            slide.className = 'lightbox-slide';
            
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Foto ${idx+1}`;
            // Zatrzymujemy propagację – kliknięcie bezpośrednio w zdjęcie nie zamyka widoku
            img.onclick = (e) => e.stopPropagation(); 
            
            slide.appendChild(img);
            lightboxTrack.appendChild(slide);
        });

        // FUNKCJE OBSŁUGI SLIDERA
        function openLightbox(idx) {
            currentImgIdx = idx;
            updateLightboxPosition();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Blokada skrolowania strony w tle
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = ''; // Przywrócenie skrolowania strony
        }

        function updateLightboxPosition() {
            lightboxTrack.style.transform = `translateX(-${currentImgIdx * 100}%)`;
            document.getElementById('lightbox-counter').textContent = `${currentImgIdx + 1} / ${images.length}`;
        }

        function nextImage(e) {
            if (e) e.stopPropagation();
            if (currentImgIdx < images.length - 1) {
                currentImgIdx++;
            } else {
                currentImgIdx = 0; // Powrót na początek po dojściu do końca
            }
            updateLightboxPosition();
        }

        function prevImage(e) {
            if (e) e.stopPropagation();
            if (currentImgIdx > 0) {
                currentImgIdx--;
            } else {
                currentImgIdx = images.length - 1; // Przejście na koniec z pierwszego zdjęcia
            }
            updateLightboxPosition();
        }

        // SWIPE NA SMARTFONACH (Wydajne i płynne zdarzenia dotykowe)
        let touchStartX = 0;
        let touchEndX = 0;
        const lightbox = document.getElementById('lightbox');

        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        lightbox.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = touchEndX - touchStartX;
            
            if (swipeDistance < -50) {
                nextImage(); // Przesunięcie w lewo -> następne zdjęcie
            } else if (swipeDistance > 50) {
                prevImage(); // Przesunięcie w prawo -> poprzednie zdjęcie
            }
        }, {passive: true});

        // NAWIGACJA KLAWIATURĄ
        window.addEventListener('keydown', e => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
                if (e.key === 'Escape') closeLightbox();
            }
        });

        function switchView(v) {
            document.getElementById('main-view').classList.toggle('hidden', v !== 'main');
            document.getElementById('booking-view').classList.toggle('hidden', v !== 'booking');
            window.scrollTo(0,0);
        }

        function scrollToSection(id) {
            switchView('main');
            setTimeout(() => { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }, 50);
        }

        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await fetch('https://formspree.io/f/mkopojqj', { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
            alert('Dziękujemy! Skontaktujemy się wkrótce.');
            switchView('main');
        };

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
